version: '3'

services:

  caddy:
    build:
      # need to include files from parent dir (see Dockerfile)
      context: ../
      dockerfile: docker/caddy/Dockerfile
    restart: unless-stopped
    # Persist certs across container rebuilds to avoid
    # hitting the Let's Encrypt rate limit on redeployment.
    volumes:
      - caddy_data:/root/.local/share/caddy
    ports:
      - "443:443"
      - "80:80"

  prayer:
    build:
      # need to include files from parent dir (see Dockerfile)
      context: ../
      dockerfile: docker/prayer-app/Dockerfile
    restart: unless-stopped
    volumes:
      - ${PRAYER_APP_FILES_DIR}:/etc/prayer-app/files
    ports:
      - "3456:3456"

volumes:
  caddy_data:
